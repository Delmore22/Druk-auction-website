name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify required root files exist
        run: |
          set -e
          test -f index.html
          test -f index.js
          test -f index.css
          test -f car-dashboard.html
          test -f car-dashboard.js

      - name: JavaScript syntax check
        shell: pwsh
        run: |
          $jsFiles = git ls-files '*.js'
          if (-not $jsFiles) {
            throw 'No JavaScript files were found in the repository.'
          }
          foreach ($file in $jsFiles) {
            node --check $file
          }