<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Details - Collectors Alliance Exchange</title>
    <link rel="stylesheet" href="css.css">
    <link rel="stylesheet" href="car-details.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="dark-theme car-details-page" data-page="car-details">
    <div id="header-placeholder"></div>

    <div id="below-header-placeholder"></div>

    <!-- Main Content Area -->
    <main class="main-container">
        <!-- Left Sidebar -->
        <div id="left-sidebar-placeholder"></div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="car-detail-breadcrumb">
                <button class="back-button" type="button"><i class="fas fa-chevron-left"></i> Back</button>
            </div>
            <section class="car-detail" id="carDetailSection">
                <p class="car-detail-loading">Loading vehicle details&hellip;</p>
            </section>
        </div>

        <!-- Right Sidebar -->
        <aside class="right-sidebar" id="rightSidebar">
            <div class="sidebar-header">
                <button class="collapse-btn" data-action="toggle-right-sidebar" type="button">
                    <span id="rightArrow">▶</span>
                </button>
                <span class="sidebar-title">Quick Actions</span>
            </div>
            
            <div class="collapsed-icons">
                <a class="collapsed-icon" href="#" data-tooltip="Contact Seller" title="Contact Seller" aria-label="Contact Seller"><i class="fas fa-envelope" aria-hidden="true"></i></a>
                <a class="collapsed-icon" href="#" data-tooltip="Share on Social Media" title="Share on Social Media" aria-label="Share on Social Media"><i class="fas fa-share-alt" aria-hidden="true"></i></a>
                <a class="collapsed-icon" href="#" data-tooltip="Add to Watchlist" title="Add to Watchlist" aria-label="Add to Watchlist"><i class="fas fa-star" aria-hidden="true"></i></a>
            </div>
            
            <div class="right-sidebar-content">
                <a class="quick-action" href="#">
                    <div class="action-icon" aria-hidden="true"><i class="fas fa-envelope"></i></div>
                    <div class="action-details">
                        <h4>Contact Seller</h4>
                        <p>Send a direct message about this vehicle</p>
                    </div>
                </a>
                <a class="quick-action" href="#">
                    <div class="action-icon" aria-hidden="true"><i class="fas fa-share-alt"></i></div>
                    <div class="action-details">
                        <h4>Share on Social Media</h4>
                        <p>Send the listing to your network</p>
                    </div>
                </a>
                <a class="quick-action" href="#">
                    <div class="action-icon" aria-hidden="true"><i class="fas fa-star"></i></div>
                    <div class="action-details">
                        <h4>Add to Watchlist</h4>
                        <p>Save this car for later review</p>
                    </div>
                </a>
            </div>
        </aside>
    </main>

    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
    <script src="car-details.js"></script>
</body>
</html>
